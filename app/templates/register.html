{% extends 'base.html' %}
{% block title %}Register — Discover Inspector{% endblock %}

{% block content %}
<div class="max-w-sm mx-auto mt-20">
  <h1 class="text-2xl font-bold text-center mb-8 text-indigo-400">Discover Inspector</h1>
  <div class="bg-gray-900 border border-gray-800 rounded-xl p-8">
    <h2 class="text-lg font-semibold mb-6">Create account</h2>
    <form method="post" class="space-y-4">
      <div>
        <label class="block text-sm text-gray-400 mb-1">Username</label>
        <input name="username" type="text" required autofocus
          class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
      </div>
      <div>
        <label class="block text-sm text-gray-400 mb-1">Password</label>
        <input name="password" type="password" required
          class="w-full bg-gray-800 border border-gray-700 rounded-md px-3 py-2 text-sm focus:outline-none focus:border-indigo-500">
      </div>
      <button type="submit"
        class="w-full bg-indigo-600 hover:bg-indigo-500 text-white rounded-md py-2 text-sm font-medium transition-colors">
        Create account
      </button>
    </form>
    <p class="mt-4 text-center text-sm text-gray-500">
      Already have an account? <a href="{{ url_for('auth.login') }}" class="text-indigo-400 hover:text-indigo-300">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}
