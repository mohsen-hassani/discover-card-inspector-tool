# Drop this file in /etc/nginx/sites-available/discover-inspector
# then: ln -s /etc/nginx/sites-available/discover-inspector /etc/nginx/sites-enabled/
# and:  nginx -t && systemctl reload nginx

server {
    listen 80;
    server_name discover-inspector.vione.cloud;

    # After certbot: replace this block with a redirect
    # return 301 https://$host$request_uri;

    client_max_body_size 50M;

    # Serve uploaded images directly from the Docker volume's host path.
    # Find the volume path with:
    #   docker volume inspect discovercardinspectortool_card_data
    # Then set the alias below (example path shown):
    location /uploads/ {
        alias /var/lib/docker/volumes/discovercardinspectortool_card_data/_data/uploads/;
        expires 7d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://127.0.0.1:5001;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }
}

