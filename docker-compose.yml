services:
  app:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_PATH=/data/db.sqlite3
      - UPLOAD_FOLDER=/data/uploads
    volumes:
      # `touch db.sqlite3` once on the host before the first `docker compose up`;
      # Docker creates a directory instead of a file if the path doesn't exist yet.
      - ./db.sqlite3:/data/db.sqlite3
      - ./uploads:/data/uploads
    ports:
      - "127.0.0.1:5001:5000"  # only reachable from host, not the public internet
