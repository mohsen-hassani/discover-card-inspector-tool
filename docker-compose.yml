services:
  app:
    build: .
    restart: unless-stopped
    environment:
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - DATABASE_PATH=/data/db.sqlite3
      - UPLOAD_FOLDER=/data/uploads
    volumes:
      - /opt/discover-inspector/data:/data
    ports:
      - "127.0.0.1:5001:5000"  # only reachable from host, not the public internet
